<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人简历模板</title>
    <!-- 引入样式文件 -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/sections.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="resume-container">
        <!-- 成员4编写：主题切换控件放置区 -->
        <div class="theme-control" style="text-align: right; margin-bottom: 1rem;">
            <button id="theme-toggle" class="btn-toggle" style="padding: 0.5rem 1rem; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary);">切换主题</button>
        </div>

        <!-- 成员2编写：头部个人信息 & 教育背景 -->
        <header id="hero-section" class="section-hero">
           <!-- 头部个人信息 -->
            <img src="assets/avatar.png" alt="个人头像" class="avatar" style="width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--primary-color); margin-bottom: 1rem;">
            <h1 class="hero-name" style="font-size: 2.2rem; color: var(--text-primary); margin-bottom: 0.5rem;">Rain541</h1>
            <p class="hero-title" style="font-size: 1.1rem; color: var(--primary-color); margin-bottom: 0.5rem;">Web 前端开发工程师 / UI 设计师</p>
            <div class="hero-contact" style="color: var(--text-secondary); font-size: 0.9rem;">
                <span>📧 danziyixuan@outlook.com</span> | <span>📱 138-0000-0000</span> | <span>🌐 <a href="https://github.com" style="color: var(--primary-color); text-decoration: none;">GitHub 主页</a></span>
            </div>
        </header>
        
        <section id="education-section">
            <!-- 教育经历 -->
            <h2 class="section-title">教育背景 (Education)</h2>
            <div class="edu-card" style="background-color: var(--bg-primary); padding: 1.2rem; border-radius: var(--radius); border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3 class="edu-school" style="font-size: 1.1rem; color: var(--text-primary);">北京信息科技大学</h3>
                    <p class="edu-major" style="font-size: 0.9rem; color: var(--text-secondary);">计算机科学与技术 / 本科</p>
                </div>
                <span class="edu-time" style="font-size: 0.9rem; color: var(--primary-color); font-weight: bold;">2021.09 - 2025.07</span>
            </div>
        </section>

        <!-- 成员3编写：工作经历 & 技能展示 -->
        <section id="experience-section">
            <!-- 此处由成员 3 填充 -->
        </section>

        <section id="skills-section">
            <!-- 此处由成员 3 填充 -->
        </section>
    </div>
    <!-- 引入交互脚本 -->
    <script src="js/theme.js"></script>
</body>
</html>
