<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人简历模板</title>
    <!-- 引入样式文件 -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/sections.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="resume-container">
        <!-- 成员4编写：主题切换控件放置区 -->
        <div class="theme-control" style="text-align: right; margin-bottom: 1rem;">
            <button id="theme-toggle" class="btn-toggle" style="padding: 0.5rem 1rem; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary);">切换主题</button>
        </div>

        <!-- 成员2编写：头部个人信息 & 教育背景 -->
        <header id="hero-section" class="section-hero">
            <!-- 此处由成员 2 填充 -->
        </header>
        
        <section id="education-section">
            <!-- 此处由成员 2 填充 -->
        </section>

        <!-- 成员3编写：工作经历 & 技能展示 -->
        <section id="experience-section">
            <!-- 此处由成员 3 填充 -->
        </section>

        <section id="skills-section">
            <!-- 此处由成员 3 填充 -->
        </section>
    </div>
    <!-- 引入交互脚本 -->
    <script src="js/theme.js"></script>
</body>
</html>
